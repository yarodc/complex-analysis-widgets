<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taylor vs Laurent — regiões de convergência</title>
<style>
  :root{
    --bg: #f7f6f3;
    --surface-1: #ffffff;
    --surface-2: #ffffff;
    --text-primary: #23201c;
    --text-secondary: #6b6559;
    --text-muted: #a39c8e;
    --text-accent: #185fa5;
    --text-success: #0f6e56;
    --text-danger: #993c1d;
    --border: #e4ddd0;
    --border-strong: #cfc6b4;
    --border-stronger: #a39c8e;
    --bg-accent: #378add;
    --radius: 10px;
  }
  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 760px;
    margin: 24px auto;
    padding: 0 16px 40px;
    line-height:1.5;
  }
  h1{ font-size:20px; margin-bottom:4px; }
  .subtitle{ color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
  svg{ display:block; }
  select, button{
    font-family:inherit;
    font-size:14px;
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:var(--surface-1);
    color:var(--text-primary);
    cursor:pointer;
  }
  button:hover{ background:var(--border); }
  .th{ font-size:14px; font-weight:600; fill:var(--text-primary); }
  .ts{ font-size:11px; fill:var(--text-secondary); }
  .leader{ stroke:var(--border-strong); stroke-width:1; stroke-dasharray:2 2; fill:none; }
  .c-blue{ fill:#DCEBFB; stroke:#378ADD; }
  .c-teal{ fill:#DAF1EC; stroke:#0F6E56; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  a.backlink{ display:inline-block; margin-bottom:16px; font-size:13px; color:var(--text-accent); text-decoration:none; }
  a.backlink:hover{ text-decoration:underline; }
</style>

</head>
<body>
<h1>Taylor vs. Laurent: regiões de convergência</h1>
<div class="subtitle">Funções de Variáveis Complexas — Física Matemática A (IFSC-USP)</div>

<svg width="100%" viewBox="0 0 680 420" role="img">
<title>Comparação entre o disco de convergência da série de Taylor e o anel de convergência da série de Laurent</title>
<desc>Diagrama ilustrativo mostrando como a série de Taylor converge apenas dentro de um disco cujo raio é a distância até o polo mais próximo, enquanto a série de Laurent converge num anel entre duas singularidades, contornando a mais próxima.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="170" y="36" text-anchor="middle">Série de Taylor</text>
<circle cx="170" cy="215" r="75" class="c-blue" fill-opacity="1" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="170" cy="215" r="2.5" fill="var(--text-primary)"/>
<text class="ts" x="178" y="212">z0</text>

<circle cx="235" cy="177.5" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="231" y1="173.5" x2="239" y2="181.5" stroke="#993C1D" stroke-width="1.5"/>
<line x1="239" y1="173.5" x2="231" y2="181.5" stroke="#993C1D" stroke-width="1.5"/>

<circle cx="62" cy="152.5" r="5" fill="none" stroke="var(--border-stronger)" stroke-width="1.5"/>
<line x1="58" y1="148.5" x2="66" y2="156.5" stroke="var(--border-stronger)" stroke-width="1.5"/>
<line x1="66" y1="148.5" x2="58" y2="156.5" stroke="var(--border-stronger)" stroke-width="1.5"/>

<line class="leader" x1="235" y1="177.5" x2="300" y2="140"/>
<text class="ts" x="304" y="136">polo mais próximo</text>
<text class="ts" x="304" y="152">limita o raio</text>

<line class="leader" x1="170" y1="140" x2="255" y2="90"/>
<text class="ts" x="259" y="86">raio = distância</text>
<text class="ts" x="259" y="100">até esse polo</text>

<line class="leader" x1="62" y1="152.5" x2="18" y2="100"/>
<text class="ts" x="0" y="88" text-anchor="start">polo mais distante</text>
<text class="ts" x="0" y="102" text-anchor="start">(fora do disco, não importa)</text>

<text class="ts" x="170" y="400" text-anchor="middle">série só converge dentro do disco — não enxerga o que há além do polo</text>

<text class="th" x="510" y="36" text-anchor="middle">Série de Laurent</text>
<circle cx="510" cy="215" r="130" class="c-teal" fill-opacity="1" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="510" cy="215" r="40" fill="var(--surface-2)" stroke="var(--border-stronger)" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="510" cy="215" r="2.5" fill="var(--text-primary)"/>
<text class="ts" x="518" y="212">z0</text>

<circle cx="471.5" cy="228.7" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="467.5" y1="224.7" x2="475.5" y2="232.7" stroke="#993C1D" stroke-width="1.5"/>
<line x1="475.5" y1="224.7" x2="467.5" y2="232.7" stroke="#993C1D" stroke-width="1.5"/>

<circle cx="632.2" cy="165.5" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="628.2" y1="161.5" x2="636.2" y2="169.5" stroke="#993C1D" stroke-width="1.5"/>
<line x1="636.2" y1="161.5" x2="628.2" y2="169.5" stroke="#993C1D" stroke-width="1.5"/>

<line class="leader" x1="471.5" y1="228.7" x2="420" y2="280"/>
<text class="ts" x="380" y="296" text-anchor="middle">polo interno</text>
<text class="ts" x="380" y="310" text-anchor="middle">(limita o raio interno)</text>

<line class="leader" x1="632.2" y1="165.5" x2="650" y2="110"/>
<text class="ts" x="655" y="90" text-anchor="start">próxima singularidade</text>
<text class="ts" x="655" y="104" text-anchor="start">(limita o raio externo)</text>

<text class="ts" x="510" y="400" text-anchor="middle">série converge no anel — contorna o polo interno em vez de parar nele</text>
</svg>
</body>
</html>
