<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taylor vs Laurent — regiões de convergência</title>
<style>
  :root{
    --bg: #f7f6f3;
    --surface-1: #ffffff;
    --surface-2: #ffffff;
    --text-primary: #23201c;
    --text-secondary: #6b6559;
    --text-muted: #a39c8e;
    --text-accent: #185fa5;
    --text-success: #0f6e56;
    --text-danger: #993c1d;
    --border: #e4ddd0;
    --border-strong: #cfc6b4;
    --border-stronger: #a39c8e;
    --bg-accent: #378add;
    --radius: 10px;
  }
  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 760px;
    margin: 24px auto;
    padding: 0 16px 40px;
    line-height:1.5;
  }
  h1{ font-size:20px; margin-bottom:4px; }
  .subtitle{ color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
  svg{ display:block; }
  select, button{
    font-family:inherit;
    font-size:14px;
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:var(--surface-1);
    color:var(--text-primary);
    cursor:pointer;
  }
  button:hover{ background:var(--border); }
  .th{ font-size:14px; font-weight:600; fill:var(--text-primary); }
  .ts{ font-size:11px; fill:var(--text-secondary); }
  .leader{ stroke:var(--border-strong); stroke-width:1; stroke-dasharray:2 2; fill:none; }
  .c-blue{ fill:#DCEBFB; stroke:#378ADD; }
  .c-teal{ fill:#DAF1EC; stroke:#0F6E56; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  a.backlink{ display:inline-block; margin-bottom:16px; font-size:13px; color:var(--text-accent); text-decoration:none; }
  a.backlink:hover{ text-decoration:underline; }
</style>

</head>
<body>
<h1>Taylor vs. Laurent: regiões de convergência</h1>
<div class="subtitle">Funções de Variáveis Complexas — Física Matemática A (IFSC-USP)</div>

<svg width="100%" viewBox="0 0 680 440" role="img">
<title>Comparação entre o disco de convergência da série de Taylor e o anel de convergência da série de Laurent</title>
<desc>Diagrama ilustrativo mostrando como a série de Taylor converge apenas dentro de um disco cujo raio é a distância até o polo mais próximo, enquanto a série de Laurent converge num anel entre duas singularidades, contornando a mais próxima.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="170" y="40" text-anchor="middle">Série de Taylor</text>
<circle cx="170" cy="220" r="75" class="c-blue" fill-opacity="1" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="170" cy="220" r="2.5" fill="var(--text-primary)"/>
<text class="ts" x="178" y="217">z0</text>

<circle cx="235" cy="182.5" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="231" y1="178.5" x2="239" y2="186.5" stroke="#993C1D" stroke-width="1.5"/>
<line x1="239" y1="178.5" x2="231" y2="186.5" stroke="#993C1D" stroke-width="1.5"/>

<circle cx="70" cy="160" r="5" fill="none" stroke="var(--border-stronger)" stroke-width="1.5"/>
<line x1="66" y1="156" x2="74" y2="164" stroke="var(--border-stronger)" stroke-width="1.5"/>
<line x1="74" y1="156" x2="66" y2="164" stroke="var(--border-stronger)" stroke-width="1.5"/>

<line class="leader" x1="235" y1="182.5" x2="295" y2="150"/>
<text class="ts" x="299" y="146">polo mais próximo</text>
<text class="ts" x="299" y="160">limita o raio</text>

<line class="leader" x1="170" y1="145" x2="248" y2="100"/>
<text class="ts" x="252" y="96">raio = distância</text>
<text class="ts" x="252" y="110">até esse polo</text>

<line class="leader" x1="70" y1="160" x2="35" y2="115"/>
<text class="ts" x="20" y="102" text-anchor="start">polo mais distante</text>
<text class="ts" x="20" y="116" text-anchor="start">(fora do disco, não importa)</text>

<text class="ts" x="170" y="412" text-anchor="middle">série só converge dentro do disco —</text>
<text class="ts" x="170" y="426" text-anchor="middle">não enxerga o que há além do polo</text>

<text class="th" x="510" y="40" text-anchor="middle">Série de Laurent</text>
<circle cx="510" cy="220" r="120" class="c-teal" fill-opacity="1" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="510" cy="220" r="40" fill="var(--surface-2)" stroke="var(--border-stronger)" stroke-dasharray="4 4" stroke-width="1"/>
<circle cx="510" cy="220" r="2.5" fill="var(--text-primary)"/>
<text class="ts" x="518" y="217">z0</text>

<circle cx="474" cy="232.6" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="470" y1="228.6" x2="478" y2="236.6" stroke="#993C1D" stroke-width="1.5"/>
<line x1="478" y1="228.6" x2="470" y2="236.6" stroke="#993C1D" stroke-width="1.5"/>

<circle cx="618.6" cy="164.6" r="5" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="614.6" y1="160.6" x2="622.6" y2="168.6" stroke="#993C1D" stroke-width="1.5"/>
<line x1="622.6" y1="160.6" x2="614.6" y2="168.6" stroke="#993C1D" stroke-width="1.5"/>

<line class="leader" x1="474" y1="232.6" x2="430" y2="290"/>
<text class="ts" x="430" y="306" text-anchor="middle">polo interno</text>
<text class="ts" x="430" y="320" text-anchor="middle">(limita o raio interno)</text>

<line class="leader" x1="618.6" y1="164.6" x2="640" y2="120"/>
<text class="ts" x="640" y="102" text-anchor="middle">próxima singularidade</text>
<text class="ts" x="640" y="116" text-anchor="middle">(limita o raio externo)</text>

<text class="ts" x="510" y="412" text-anchor="middle">série converge no anel — contorna</text>
<text class="ts" x="510" y="426" text-anchor="middle">o polo interno em vez de parar nele</text>
</svg>
</body>
</html>
